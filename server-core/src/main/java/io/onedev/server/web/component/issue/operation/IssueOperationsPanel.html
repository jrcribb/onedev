<wicket:panel>
	<div class="issue-operations d-flex flex-wrap row-gap-3">
		<a wicket:id="state" class="state mr-3">
			<span wicket:id="name"></span>
		</a>
		<a wicket:id="workspaces" t:data-tippy-content="Workspaces on this issue" class="workspace mr-3 btn btn-outline-secondary btn-sm flex-shrink-0">Workspaces <wicket:svg href="arrow" class="icon rotate-90"/></a>
		<a wicket:id="newIssue" class="new-issue btn btn-primary btn-sm btn-icon ml-auto" t:data-tippy-content="Create new issue"><wicket:svg href="plus" class="icon"/></a>
	</div>
</wicket:panel>
